  .lang-select{

    color:var(--ink);

  header{ text-align:center; margin-bottom:56px; }

  .eyebrow{

    text-transform:uppercase;
    opacity:0.55;
    font-weight:600;
    margin-bottom:18px;

  h1{
    font-family:'Fraunces', serif;

  body[data-lang="te"] h1 .accent,
  body[data-lang="kn"] h1 .accent,

  .sub{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:clamp(15.5px,2vw,19px);
    opacity:0.7;
    max-width:580px;
    margin:0 auto;
    line-height:1.7;

    display:grid;

    position:relative;

    top:-13px;
    left:50%;
    transform:translateX(-50%);
    background:var(--terracotta);
    color:var(--paper);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    padding:6px 16px;
    border-radius:999px;
    white-space:nowrap;

  .duration{
    font-size:13px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--teal);
    margin-bottom:10px;

    font-weight:700;
    font-size:34px;
    margin:0 0 4px 0;
    color:var(--ink);
  }

  .salary-label{ font-size:12px; opacity:0.55; margin-bottom:20px; }

  .divider{ height:1px; background:var(--line); margin:4px 0 18px 0; }

  .features{
    list-style:none;
    padding:0;
    margin:0 0 26px 0;
    flex-grow:1;
  }

  .features li{
    display:flex;
    align-items:flex-start;
    gap:10px;
    font-size:14.5px;
    line-height:1.55;
    margin-bottom:12px;
    color:var(--ink);

    padding:14px 20px;

    font-size:14px;
    font-weight:700;
    letter-spacing:0.02em;
    text-transform:uppercase;
    color:var(--paper);
    background:var(--ink);

    border-radius:999px;
    cursor:pointer;
    text-decoration:none;
    position:relative;
    overflow:hidden;
    isolation:isolate;

    top:0; left:-45%;

    55%  { left:105%; }

  .card.popular .apply::before{

  body[dir="rtl"] .lang-select{

  body[dir="rtl"] .features li{ flex-direction:row-reverse; text-align:right; }
  body[dir="rtl"] .badge{ letter-spacing:0; }

  @media (prefers-reduced-motion: reduce){
    .apply::before{ animation:none; left:-45%; }
  }
</style>
</head>

function applyLanguage(lang){
  const t = translations[lang] || translations.en;
  document.body.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang);
  document.body.setAttribute('dir', lang === 'ur' ? 'rtl' : 'ltr');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    const n = el.getAttribute('data-n');
    const value = t[key];
    if (typeof value === 'function'){
      el.textContent = value(n);
    } else if (value !== undefined){
      el.textContent = value;
    }
  });
}

const select = document.getElementById('langSelect');
select.value = 'en';
applyLanguage('en');
select.addEventListener('change', (e) => applyLanguage(e.target.value));
